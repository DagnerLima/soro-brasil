<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Soro Antiofídico - Brasil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-dark: #0f1923;
      --bg-card: #1a2634;
      --accent: #00d4aa;
      --accent-hover: #00f0c0;
      --text: #e8edf2;
      --text-muted: #8899aa;
      --danger: #ff6b6b;
      --warning: #ffd93d;
      --border: #2a3a4a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      z-index: 1000;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .logo h1 span {
      color: var(--text-muted);
      font-weight: 400;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      display: block;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    select, input[type="text"] {
      background: var(--bg-dark);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"] {
      width: 220px;
    }

    .stats {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      color: var(--accent);
      font-weight: 700;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .main-content {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    #map {
      flex: 1;
      z-index: 1;
    }

    .sidebar {
      width: 380px;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      z-index: 2;
      display: none;
      flex-direction: column;
    }

    .sidebar.open {
      display: flex;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 3;
    }

    .sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .close-btn:hover {
      color: var(--text);
      background: var(--bg-dark);
    }

    .hospital-detail {
      padding: 16px;
    }

    .hospital-detail .hospital-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .hospital-detail .hospital-city {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-icon {
      width: 32px;
      height: 32px;
      background: var(--bg-dark);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .detail-content {
      flex: 1;
    }

    .detail-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .detail-value {
      font-size: 13px;
      line-height: 1.4;
    }

    .route-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
      text-align: center;
      text-decoration: none;
    }

    .route-btn:hover {
      background: var(--accent-hover);
    }

    .warning-box {
      background: rgba(255, 217, 61, 0.1);
      border: 1px solid rgba(255, 217, 61, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
    }

    .warning-box p {
      font-size: 12px;
      color: var(--warning);
      line-height: 1.5;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .leaflet-popup-content-wrapper {
      background: var(--bg-card) !important;
      color: var(--text) !important;
      border-radius: 8px !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4) !important;
    }

    .leaflet-popup-tip {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
    }

    .leaflet-popup-content {
      margin: 12px !important;
      font-family: 'DM Sans', sans-serif !important;
    }

    .popup-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .popup-city {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .popup-soros {
      font-size: 11px;
      color: var(--text);
      line-height: 1.4;
    }

    .popup-link {
      display: inline-block;
      margin-top: 8px;
      color: var(--accent);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }

    .marker-cluster-small {
      background-color: rgba(0, 212, 170, 0.3) !important;
    }
    .marker-cluster-small div {
      background-color: rgba(0, 212, 170, 0.7) !important;
      color: var(--bg-dark) !important;
      font-family: 'Space Mono', monospace !important;
      font-weight: 700 !important;
    }
    .marker-cluster-medium {
      background-color: rgba(255, 217, 61, 0.3) !important;
    }
    .marker-cluster-medium div {
      background-color: rgba(255, 217, 61, 0.7) !important;
      color: var(--bg-dark) !important;
      font-family: 'Space Mono', monospace !important;
      font-weight: 700 !important;
    }
    .marker-cluster-large {
      background-color: rgba(255, 107, 107, 0.3) !important;
    }
    .marker-cluster-large div {
      background-color: rgba(255, 107, 107, 0.7) !important;
      color: var(--bg-dark) !important;
      font-family: 'Space Mono', monospace !important;
      font-weight: 700 !important;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        padding: 8px 12px;
        gap: 8px;
      }
      .controls {
        width: 100%;
      }
      select, input[type="text"] {
        flex: 1;
        min-width: 0;
      }
      input[type="text"] {
        width: auto;
      }
      .sidebar {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: 100%;
        max-width: 380px;
      }
      .stats {
        gap: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <p class="loading-text">Carregando hospitais...</p>
  </div>

  <header>
    <div class="logo">
      <div class="logo-icon">🐍</div>
      <h1>PESA BRASIL <span>Hospitais com Soro Antiofídico</span></h1>
    </div>
    <div class="controls">
      <select id="filterRegiao">
        <option value="">Todas as Regiões</option>
        <option value="Norte">Norte</option>
        <option value="Nordeste">Nordeste</option>
        <option value="Centro-Oeste">Centro-Oeste</option>
        <option value="Sudeste">Sudeste</option>
        <option value="Sul">Sul</option>
      </select>
      <select id="filterEstado">
        <option value="">Todos os Estados</option>
      </select>
      <input type="text" id="searchBox" placeholder="Buscar município ou hospital...">
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-number" id="totalHospitais">0</div>
        <div class="stat-label">Hospitais</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="totalMunicipios">0</div>
        <div class="stat-label">Municípios</div>
      </div>
    </div>
  </header>

  <div class="main-content">
    <div id="map"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Detalhes do Hospital</h2>
        <button class="close-btn" id="closeSidebar">✕</button>
      </div>
      <div class="hospital-detail" id="hospitalDetail"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    // === CONFIGURAÇÃO ===
    // Cole aqui o ID da sua planilha Google Sheets
    const SPREADSHEET_ID = '1iUaty6oqb-ea664bx10Qaom2onSP_N2CYPerOtOreRY';
    const SHEET_NAME = 'Dados';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

    // === GEOCODING CACHE ===
    let hospitaisData = [];
    let markers = [];
    let markerCluster;

    // === MAPA ===
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: true
    }).setView([-14.235, -51.9253], 4);

    // Tiles do Google Maps (visual idêntico)
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      attribution: 'Dados: Ministério da Saúde | Tiles: Google Maps'
    }).addTo(map);

    // Custom icon
    function createIcon(color = '#00d4aa') {
      return L.divIcon({
        className: 'custom-marker',
        html: `<div style="
          width: 28px; height: 28px;
          background: ${color};
          border: 3px solid white;
          border-radius: 50%;
          box-shadow: 0 2px 8px rgba(0,0,0,0.3);
          display: flex; align-items: center; justify-content: center;
          font-size: 12px;
        ">🏥</div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -14]
      });
    }

    // === GEOCODING via Nominatim (gratuito) ===
    const geocodeCache = {};
    let geocodeQueue = [];
    let geocoding = false;

    async function geocodeAddress(address) {
      if (geocodeCache[address]) return geocodeCache[address];

      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&countrycodes=BR&limit=1`;

      try {
        const response = await fetch(url, {
          headers: { 'User-Agent': 'PESABrasil/1.0' }
        });
        const data = await response.json();

        if (data && data.length > 0) {
          const result = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          geocodeCache[address] = result;
          return result;
        }
      } catch (e) {
        console.error('Geocoding error:', e);
      }
      return null;
    }

    async function geocodeWithDelay(address, delay = 1100) {
      return new Promise(resolve => {
        setTimeout(async () => {
          const result = await geocodeAddress(address);
          resolve(result);
        }, delay);
      });
    }

    // === CARREGAR DADOS ===
    async function loadData() {
      return new Promise((resolve, reject) => {
        Papa.parse(CSV_URL, {
          download: true,
          header: true,
          complete: (results) => resolve(results.data.filter(row => row['Município'] && row['Município'].trim())),
          error: (err) => reject(err)
        });
      });
    }

    // === RENDERIZAR MARCADORES ===
    function renderMarkers(data) {
      if (markerCluster) {
        map.removeLayer(markerCluster);
      }

      markerCluster = L.markerClusterGroup({
        maxClusterRadius: 50,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false
      });

      markers = [];
      let added = 0;

      data.forEach((hospital, index) => {
        const localidade = hospital['Localidade'] || '';
        // Tenta extrair coordenadas se já geocodificou
        const cacheKey = localidade || `${hospital['Unidade de Saúde']}, ${hospital['Município']}, Brasil`;

        if (geocodeCache[cacheKey]) {
          const coords = geocodeCache[cacheKey];
          const marker = createMarker(hospital, coords);
          markerCluster.addLayer(marker);
          markers.push({ marker, data: hospital });
          added++;
        }
      });

      map.addLayer(markerCluster);
      updateStats(data);
      return added;
    }

    function createMarker(hospital, coords) {
      const marker = L.marker([coords.lat, coords.lng], { icon: createIcon() });

      const popupContent = `
        <div class="popup-name">${hospital['Unidade de Saúde'] || ''}</div>
        <div class="popup-city">${hospital['Município'] || ''} - ${hospital['Estado'] || ''}</div>
        <div class="popup-soros">${hospital['Atende picadas de'] || ''}</div>
        <div class="popup-link" onclick="showDetail(${JSON.stringify(hospital).replace(/"/g, '&quot;')})">Ver detalhes →</div>
      `;

      marker.bindPopup(popupContent, { maxWidth: 280 });
      return marker;
    }

    function showDetail(hospital) {
      const sidebar = document.getElementById('sidebar');
      const detail = document.getElementById('hospitalDetail');

      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hospital['Localidade'] || hospital['Unidade de Saúde'] + ', ' + hospital['Município'])}`;

      detail.innerHTML = `
        <div class="hospital-name">${hospital['Unidade de Saúde'] || ''}</div>
        <div class="hospital-city">${hospital['Município'] || ''} - ${hospital['Estado'] || ''}</div>

        <div class="detail-row">
          <div class="detail-icon">📍</div>
          <div class="detail-content">
            <div class="detail-label">Endereço</div>
            <div class="detail-value">${hospital['Endereço'] || ''}</div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">📞</div>
          <div class="detail-content">
            <div class="detail-label">Telefones</div>
            <div class="detail-value">${hospital['Telefones'] || ''}</div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">🏷️</div>
          <div class="detail-content">
            <div class="detail-label">Código CNES</div>
            <div class="detail-value">${hospital['Código CNES'] || ''}</div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">💉</div>
          <div class="detail-content">
            <div class="detail-label">Soros Disponíveis</div>
            <div class="detail-value">${hospital['Soros'] || ''}</div>
          </div>
        </div>

        <div class="detail-row">
          <div class="detail-icon">🐍</div>
          <div class="detail-content">
            <div class="detail-label">Atende Picadas de</div>
            <div class="detail-value">${hospital['Atende picadas de'] || ''}</div>
          </div>
        </div>

        <a href="${mapsUrl}" target="_blank" class="route-btn">📍 Abrir Rotas no Google Maps</a>

        <div class="warning-box">
          <p>⚠️ ${hospital['Leia antes de ir'] || 'Vá ao local pelo botão Rotas. Não amarre o membro (torniquete). Tire uma foto do animal, se for seguro.'}</p>
        </div>
      `;

      sidebar.classList.add('open');
    }

    // === FILTROS ===
    function filterData() {
      const regiao = document.getElementById('filterRegiao').value;
      const estado = document.getElementById('filterEstado').value;
      const search = document.getElementById('searchBox').value.toLowerCase();

      let filtered = hospitaisData;

      if (regiao) {
        filtered = filtered.filter(h => h['Região'] === regiao);
      }

      if (estado) {
        filtered = filtered.filter(h => h['Estado'] === estado);
      }

      if (search) {
        filtered = filtered.filter(h =>
          (h['Município'] || '').toLowerCase().includes(search) ||
          (h['Unidade de Saúde'] || '').toLowerCase().includes(search) ||
          (h['Soros'] || '').toLowerCase().includes(search)
        );
      }

      renderMarkers(filtered);
    }

    function populateEstados(data) {
      const estados = [...new Set(data.map(h => h['Estado']).filter(Boolean))].sort();
      const select = document.getElementById('filterEstado');

      estados.forEach(estado => {
        const option = document.createElement('option');
        option.value = estado;
        option.textContent = estado;
        select.appendChild(option);
      });
    }

    function updateStats(data) {
      document.getElementById('totalHospitais').textContent = data.length;
      const municipios = new Set(data.map(h => h['Município']).filter(Boolean));
      document.getElementById('totalMunicipios').textContent = municipios.size;
    }

    // === FILTRO DE REGIÃO -> ESTADO ===
    document.getElementById('filterRegiao').addEventListener('change', function() {
      const regiao = this.value;
      const estadoSelect = document.getElementById('filterEstado');
      estadoSelect.innerHTML = '<option value="">Todos os Estados</option>';

      let estados;
      if (regiao) {
        estados = [...new Set(hospitaisData.filter(h => h['Região'] === regiao).map(h => h['Estado']).filter(Boolean))].sort();
      } else {
        estados = [...new Set(hospitaisData.map(h => h['Estado']).filter(Boolean))].sort();
      }

      estados.forEach(estado => {
        const option = document.createElement('option');
        option.value = estado;
        option.textContent = estado;
        estadoSelect.appendChild(option);
      });

      filterData();
    });

    document.getElementById('filterEstado').addEventListener('change', filterData);
    document.getElementById('searchBox').addEventListener('input', filterData);

    document.getElementById('closeSidebar').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
    });

    // === INICIALIZAÇÃO ===
    async function init() {
      try {
        hospitaisData = await loadData();
        console.log(`Carregados ${hospitaisData.length} hospitais`);

        populateEstados(hospitaisData);
        updateStats(hospitaisData);

        // Geocodificar todos os hospitais
        const loadingText = document.querySelector('.loading-text');
        let geocoded = 0;
        const total = hospitaisData.length;

        for (let i = 0; i < hospitaisData.length; i++) {
          const hospital = hospitaisData[i];
          const address = hospital['Localidade'] || `${hospital['Unidade de Saúde']}, ${hospital['Município']}, Brasil`;

          loadingText.textContent = `Geocodificando ${i + 1} de ${total}... (${hospital['Município']})`;

          const coords = await geocodeWithDelay(address, i === 0 ? 0 : 1100);

          if (coords) {
            geocodeCache[address] = coords;
            geocoded++;
          }

          // Atualiza o mapa a cada 10 hospitais
          if ((i + 1) % 10 === 0 || i === hospitaisData.length - 1) {
            renderMarkers(hospitaisData);
          }
        }

        console.log(`Geocodificados: ${geocoded} de ${total}`);

        // Esconde loading
        document.getElementById('loading').classList.add('hidden');

      } catch (error) {
        console.error('Erro ao carregar dados:', error);
        document.querySelector('.loading-text').textContent = 'Erro ao carregar dados. Verifique se a planilha está publicada.';
      }
    }

    // Expor showDetail globalmente
    window.showDetail = showDetail;

    init();
  </script>
</body>
</html>
